name: Render Automation Video

on:
  repository_dispatch:
    types: [render_and_upload]
  workflow_dispatch:

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests moviepy==1.0.3

      - name: Run Python Engine
        env:
          AUDIO_URL: ${{ github.event.client_payload.audio_url }}
          SEARCH_KEYWORD: ${{ github.event.client_payload.search_keyword }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python render_video.py
