name: Render Automation Video

on:
  repository_dispatch:
    types: [render_and_upload]
  workflow_dispatch:

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests moviepy==1.0.3 Pillow==9.5.0

      - name: Run Python Engine
        env:
          AUDIO_URL: ${{ github.event.client_payload.audio_url }}
          SCENE_1: ${{ github.event.client_payload.scene_1 }}
          SCENE_2: ${{ github.event.client_payload.scene_2 }}
          SCENE_3: ${{ github.event.client_payload.scene_3 }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python render_video.py
